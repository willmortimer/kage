name: macos-tags

on:
  workflow_dispatch:

jobs:
  macos:
    # Requires a self-hosted macOS runner with Apple silicon (ARM64) and macOS 26+.
    runs-on: [self-hosted, macOS, ARM64]
    env:
      MISE_TASK_OUTPUT: prefix
      KAGE_MACOS_DEPLOYMENT_TARGET: "26.0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          version: 2025.11.11
          install: true
          cache: true

      - name: Print mise version
        run: mise -v

      - name: Trust mise config
        run: mise trust --all --yes

      - name: Validate tasks
        run: mise tasks validate --errors-only

      - name: Assert runner compatibility (arm64 + macOS 26+)
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          if [[ "${arch}" != "arm64" ]]; then
            echo "expected arm64 runner, got: ${arch}" >&2
            exit 1
          fi
          ver="$(sw_vers -productVersion)"
          major="${ver%%.*}"
          if [[ "${major}" -lt 26 ]]; then
            echo "expected macOS 26+ runner, got: ${ver}" >&2
            exit 1
          fi

      - name: Doctor
        run: mise run doctor

      - name: Release build
        run: mise run release-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kage-macos-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/release/kage
            target/release/kaged
            target/release/age-plugin-kage
            target/release/KageHelper.app/**
